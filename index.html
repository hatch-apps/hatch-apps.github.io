<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Something is being built.</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white: #ffffff;
    --black: #000000;
    --grey: #888;
    --dim: #333;
  }

  html, body {
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
  }

  /* Noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.045;
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: screen;
  }

  /* Left accent bar */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 5px;
    height: 100vh;
    background: var(--white);
    z-index: 10;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 64px 60px 80px;
    max-width: 900px;
  }

  /* Top rule */
  .rule {
    width: 100%;
    height: 2px;
    background: var(--white);
    margin-bottom: 40px;
    opacity: 1;
    transform: scaleX(0);
    transform-origin: left;
    animation: rulein 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }

  @keyframes rulein {
    to { transform: scaleX(1); }
  }

  /* Headline */
  .headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(52px, 9vw, 110px);
    line-height: 0.92;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadein 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }

  .headline span {
    display: block;
  }

  /* Mid rule */
  .rule-mid {
    width: 60px;
    height: 2px;
    background: var(--white);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadein 0.5s ease 0.6s forwards;
  }

  /* Subtext */
  .subtext {
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: clamp(13px, 1.6vw, 17px);
    line-height: 1.6;
    letter-spacing: 0.06em;
    color: #aaa;
    text-transform: uppercase;
    max-width: 520px;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadein 0.5s ease 0.75s forwards;
  }

  /* Form */
  .form-wrap {
    opacity: 0;
    animation: fadein 0.5s ease 0.9s forwards;
  }

  .form-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 0;
    max-width: 500px;
  }

  input[type="email"] {
    flex: 1;
    background: transparent;
    border: 2px solid var(--white);
    border-right: none;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    letter-spacing: 0.04em;
    padding: 16px 20px;
    outline: none;
    transition: background 0.2s;
  }

  input[type="email"]::placeholder {
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 12px;
  }

  input[type="email"]:focus {
    background: #0a0a0a;
  }

  button[type="submit"] {
    background: var(--white);
    color: var(--black);
    border: 2px solid var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 16px 28px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  button[type="submit"]:hover {
    background: var(--black);
    color: var(--white);
  }

  /* Success state */
  .success {
    display: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 3vw, 26px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--white);
    border-left: 4px solid var(--white);
    padding-left: 20px;
    line-height: 1.4;
  }

  .success .sub {
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--grey);
    letter-spacing: 0.1em;
    margin-top: 8px;
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 28px;
    right: 40px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #333;
    text-transform: uppercase;
    opacity: 0;
    animation: fadein 0.5s ease 1.2s forwards;
  }

  @keyframes fadein {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .page { padding: 48px 28px 48px 36px; }
    .input-row { flex-direction: column; max-width: 100%; }
    input[type="email"] { border-right: 2px solid var(--white); border-bottom: none; }
    button[type="submit"] { width: 100%; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="rule"></div>

  <h1 class="headline">
    <span>YOUR PEOPLE</span>
    <span>ARE OUT THERE.</span>
    <span>WE'RE BUILDING</span>
    <span>THE WAY IN.</span>
  </h1>

  <div class="rule-mid"></div>

  <p class="subtext">
    A new app for students who want to connect<br>
    beyond the classroom. Different passions.<br>
    Different mindsets. One place to find each other.
  </p>

  <div class="form-wrap">
    <label class="form-label" for="email">Drop your email. Be first.</label>

    <div class="input-row">
      <input
        type="email"
        id="email"
        name="email"
        placeholder="your@email.com"
        required
        autocomplete="email"
      />
      <button type="submit" id="submit-btn">I'M IN →</button>
    </div>

    <div class="success" id="success">
      You're on the list.<br>
      <span class="sub">We'll reach out when it's ready.</span>
    </div>
  </div>
</div>

<div class="footer">Something is being built &nbsp;—&nbsp; Stay tuned</div>

<script>
  const btn = document.getElementById('submit-btn');
  const emailInput = document.getElementById('email');
  const success = document.getElementById('success');
  const inputRow = document.querySelector('.input-row');
  const label = document.querySelector('.form-label');

  btn.addEventListener('click', async () => {
    if (!emailInput.value || !emailInput.validity.valid) {
      emailInput.style.borderColor = '#ff3333';
      setTimeout(() => emailInput.style.borderColor = '#fff', 1000);
      return;
    }

    btn.textContent = '...';
    btn.disabled = true;

    try {
      const res = await fetch('https://formspree.io/f/xkoqpyzz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email: emailInput.value })
      });

      if (res.ok) {
        inputRow.style.display = 'none';
        label.style.display = 'none';
        success.style.display = 'block';
      } else {
        btn.textContent = 'TRY AGAIN';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'TRY AGAIN';
      btn.disabled = false;
    }
  });

  // Also handle Enter key
  emailInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btn.click();
  });
</script>

</body>
</html>
